<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | YeoboWhere?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: left;
            margin-bottom: 30px;
        }

        .weather-story {
            font-size: 0.95rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.6;
        }

        .mood-message {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            white-space: pre-line;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--primary-color);
            color: black;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            border-radius: 15px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> 돌아가기</a>
            <div class="logo-text" style="font-size: 1.5rem; margin-bottom: 5px;">YeoboWhere?</div>
            <h1 style="font-size: 1.8rem; margin-bottom: 20px;">{{title}}</h1>
        </header>

        <div class="post-container">
            <div class="weather-story">
                <i class="fa-solid fa-quote-left"></i> {{weather_story}}
            </div>
            <div class="mood-message">
                {{mood_message}}
            </div>
            <a href="{{playlist_url}}" class="action-btn">지금 감상하기 <i class="fa-brands fa-youtube"></i></a>
        </div>

        <footer>
            <p>&copy; 2026 YeoboWhere? All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
